<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lojban Word Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f4f0; --text: #1a1a1a;
    --text-secondary: #6b6b68; --text-tertiary: #a0a09c;
    --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px; --radius-lg: 12px;
    --font: system-ui, sans-serif; --font-mono: 'Courier New', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #252522; --text: #e8e7e2;
      --text-secondary: #9a9994; --text-tertiary: #5c5c58;
      --border: rgba(255,255,255,0.12); --border-hover: rgba(255,255,255,0.25);
    }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 2rem 1rem; min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { padding: 8px 14px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -0.5px; font-family: var(--font); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .panel { display: none; } .panel.active { display: block; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
  input[type=text], select, textarea {
    width: 100%; padding: 8px 12px; font-size: 14px; font-family: var(--font);
    background: var(--bg); color: var(--text);
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--border-hover); }
  button {
    padding: 8px 16px; font-size: 14px; font-family: var(--font); cursor: pointer;
    background: transparent; color: var(--text);
    border: 0.5px solid var(--border-hover); border-radius: var(--radius-md);
    transition: background 0.15s;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); font-weight: 500; }
  .badge-gismu { background: #E6F1FB; color: #0C447C; }
  .badge-cmavo { background: #EEEDFE; color: #3C3489; }
  .badge-lujvo { background: #EAF3DE; color: #27500A; }
  .badge-other { background: #f1efe8; color: #444441; }
  .empty { color: var(--text-tertiary); font-size: 14px; text-align: center; padding: 2rem; }
  .practice-card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; background: var(--bg-secondary); margin-bottom: 1rem; min-height: 120px; }
  .practice-word { font-size: 32px; font-weight: 500; margin-bottom: 8px; }
  .practice-class { margin-bottom: 12px; }
  .practice-def { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  .export-area { margin-top: 1rem; padding: 1rem; background: var(--bg-secondary); border-radius: var(--radius-md); font-size: 12px; font-family: var(--font-mono); white-space: pre-wrap; color: var(--text-secondary); max-height: 300px; overflow-y: auto; border: 0.5px solid var(--border); }
  .count-pill { background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 99px; font-size: 12px; padding: 2px 10px; color: var(--text-secondary); }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; }
  .filter-btn.active { background: var(--bg-secondary); color: var(--text); border-color: var(--border-hover); font-weight: 500; }
  .feedback { font-size: 13px; margin-top: 8px; display: none; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap input { padding-left: 32px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-tertiary); pointer-events: none; }
  .item-card { border: 0.5px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; }
  .item-view { padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; }
  .item-body { flex: 1; min-width: 0; }
  .item-main { font-weight: 500; font-size: 15px; margin-bottom: 3px; }
  .item-sub { font-size: 13px; color: var(--text-secondary); }
  .item-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }
  .item-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .act-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 6px; color: var(--text-tertiary); border-radius: var(--radius-md); }
  .act-btn:hover { background: var(--bg-secondary); color: var(--text); }
  .act-btn.del:hover { color: #E24B4A; }
  .item-edit { padding: 10px 12px; background: var(--bg-secondary); border-top: 0.5px solid var(--border); display: none; }
  .item-edit.open { display: block; }
  .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .edit-actions { display: flex; gap: 8px; margin-top: 8px; }
  .more-hint { font-size: 12px; color: var(--text-tertiary); text-align: center; padding: 8px 0; }
  .edit-label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="app">
  <h1>Lojban word trainer</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">Add words</button>
    <button class="tab" onclick="switchTab('words')">Words</button>
    <button class="tab" onclick="switchTab('practice')">Practice</button>
    <button class="tab" onclick="switchTab('sentences')">Sentences</button>
    <button class="tab" onclick="switchTab('export')">Export / Import</button>
  </div>

  <!-- ADD TAB -->
  <div id="tab-add" class="panel active">
    <div class="row">
      <div class="field">
        <label>Word (valsi)</label>
        <input type="text" id="inp-word" placeholder="e.g. klama" />
      </div>
      <div class="field">
        <label>Class</label>
        <select id="inp-class">
          <option value="gismu">gismu</option>
          <option value="cmavo">cmavo</option>
          <option value="lujvo">lujvo</option>
          <option value="other">other</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Definition</label>
      <input type="text" id="inp-def" placeholder="e.g. x1 goes to x2 from x3 via x4 using x5" />
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input type="text" id="inp-notes" placeholder="e.g. most common travel gismu" />
    </div>
    <button onclick="addWord()">Add word</button>
    <div id="add-feedback" class="feedback"></div>
    <div style="margin-top:1.5rem;">
      <div class="section-title">
        <span>Recently added</span>
        <span class="count-pill" id="word-count">0 words</span>
      </div>
      <div id="add-recent-list"></div>
    </div>
  </div>

  <!-- WORDS TAB -->
  <div id="tab-words" class="panel">
    <div class="section-title">
      <span>All words</span>
      <span class="count-pill" id="words-tab-count">0</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="word-search" placeholder="Search by word or definition..." oninput="renderWordsTab()" />
    </div>
    <div class="filter-row" id="words-tab-filter-row">
      <button class="filter-btn active" onclick="setWordsTabFilter('all', this)">all</button>
      <button class="filter-btn" onclick="setWordsTabFilter('gismu', this)">gismu</button>
      <button class="filter-btn" onclick="setWordsTabFilter('cmavo', this)">cmavo</button>
      <button class="filter-btn" onclick="setWordsTabFilter('lujvo', this)">lujvo</button>
      <button class="filter-btn" onclick="setWordsTabFilter('other', this)">other</button>
    </div>
    <div id="words-tab-list"></div>
  </div>

  <!-- PRACTICE TAB -->
  <div id="tab-practice" class="panel">
    <div class="section-title" style="margin-bottom:12px;">Pick from:</div>
    <div class="filter-row" id="practice-filter-row">
      <button class="filter-btn active" onclick="setPracticeFilter('gismu', this)">gismu only</button>
      <button class="filter-btn" onclick="setPracticeFilter('all', this)">all classes</button>
      <button class="filter-btn" onclick="setPracticeFilter('cmavo', this)">cmavo only</button>
      <button class="filter-btn" onclick="setPracticeFilter('lujvo', this)">lujvo only</button>
    </div>
    <div class="practice-card" id="practice-card">
      <div class="empty">Press "Draw word" to begin</div>
    </div>
    <button onclick="drawWord()">Draw word</button>
    <div id="sentence-section" style="display:none; margin-top:1.5rem;">
      <div class="field">
        <label>Write a sentence using this word</label>
        <input type="text" id="inp-sentence" placeholder="e.g. mi klama le zarci" />
      </div>
      <button onclick="saveSentence()">Save sentence</button>
      <div id="save-feedback" class="feedback"></div>
    </div>
  </div>

  <!-- SENTENCES TAB -->
  <div id="tab-sentences" class="panel">
    <div class="section-title">
      <span>Saved sentences</span>
      <span class="count-pill" id="sentence-count">0</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="sentence-search" placeholder="Search sentences or words..." oninput="renderSentences()" />
    </div>
    <div id="sentence-list-container"><div class="empty">No sentences yet.</div></div>
  </div>

  <!-- EXPORT TAB -->
  <div id="tab-export" class="panel">
    <div class="section-title" style="margin-bottom:8px;">Export</div>
    <div class="btn-row" style="margin-bottom:1.5rem;">
      <button onclick="copyExport()">Copy JSON</button>
      <button onclick="downloadExport()">Download .json</button>
    </div>
    <div class="section-title" style="margin-bottom:8px;">Import</div>
    <div class="field">
      <label>Paste JSON to import (merges with existing data)</label>
      <textarea id="imp-area" rows="5" style="font-family:var(--font-mono);font-size:12px;resize:vertical;" placeholder='{"words":[...],"sentences":[]}'></textarea>
    </div>
    <button onclick="importData()">Import</button>
    <div id="import-feedback" class="feedback"></div>
    <div class="section-title" style="margin-top:1.5rem;margin-bottom:8px;">Current data</div>
    <div class="export-area" id="export-area">{}</div>
  </div>
</div>

<script>
const STORAGE_KEY = 'lojban_trainer_v1';
let data = { words: [], sentences: [] };
let wordsTabFilter = 'all';
let practiceFilter = 'gismu';
let currentWord = null;

function storageLoad() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) data = JSON.parse(r); } catch(e) {}
}
function storageSave() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function addWord() {
  const word = document.getElementById('inp-word').value.trim().toLowerCase();
  const cls = document.getElementById('inp-class').value;
  const def = document.getElementById('inp-def').value.trim();
  const notes = document.getElementById('inp-notes').value.trim();
  const fb = document.getElementById('add-feedback');
  if (!word || !def) { showFeedback(fb, 'Please fill in the word and definition.', '#E24B4A'); return; }
  if (data.words.find(w => w.word === word)) { showFeedback(fb, '"' + word + '" is already in the list.', '#E24B4A'); return; }
  data.words.push({ word, class: cls, definition: def, notes, added: new Date().toISOString() });
  document.getElementById('inp-word').value = '';
  document.getElementById('inp-def').value = '';
  document.getElementById('inp-notes').value = '';
  storageSave(); render();
  showFeedback(fb, '"' + word + '" added!', '#1D9E75');
}

function removeWord(word) {
  if (!confirm('Remove "' + word + '"?')) return;
  data.words = data.words.filter(w => w.word !== word);
  storageSave(); render();
}

function toggleWordEdit(word, prefix) {
  prefix = prefix || 'we';
  const el = document.getElementById(prefix + '-' + word);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.item-edit').forEach(e => e.classList.remove('open'));
  if (!isOpen) {
    const w = data.words.find(x => x.word === word);
    if (!w) return;
    const classOpts = ['gismu','cmavo','lujvo','other'].map(c =>
      '<option value="' + c + '"' + (w.class === c ? ' selected' : '') + '>' + c + '</option>'
    ).join('');
    el.innerHTML =
      '<div class="edit-row">' +
        '<div><label class="edit-label">Word</label><input type="text" id="ew-word-' + esc(word) + '" value="' + esc(w.word) + '" /></div>' +
        '<div><label class="edit-label">Class</label><select id="ew-class-' + esc(word) + '">' + classOpts + '</select></div>' +
      '</div>' +
      '<div style="margin-bottom:8px;"><label class="edit-label">Definition</label><input type="text" id="ew-def-' + esc(word) + '" value="' + esc(w.definition) + '" /></div>' +
      '<div style="margin-bottom:8px;"><label class="edit-label">Notes</label><input type="text" id="ew-notes-' + esc(word) + '" value="' + esc(w.notes||'') + '" /></div>' +
      '<div class="edit-actions">' +
        '<button class="btn-sm" onclick="saveWordEdit(\'' + esc(word) + '\')">Save</button>' +
        '<button class="btn-sm" onclick="toggleWordEdit(\'' + esc(word) + '\',\'' + prefix + '\')">Cancel</button>' +
      '</div>';
    el.classList.add('open');
  }
}

function saveWordEdit(oldWord) {
  const newWord = document.getElementById('ew-word-' + oldWord).value.trim().toLowerCase();
  const cls = document.getElementById('ew-class-' + oldWord).value;
  const def = document.getElementById('ew-def-' + oldWord).value.trim();
  const notes = document.getElementById('ew-notes-' + oldWord).value.trim();
  if (!newWord || !def) { alert('Word and definition cannot be empty.'); return; }
  if (newWord !== oldWord && data.words.find(w => w.word === newWord)) { alert('"' + newWord + '" already exists.'); return; }
  const idx = data.words.findIndex(w => w.word === oldWord);
  if (idx === -1) return;
  data.words[idx] = { ...data.words[idx], word: newWord, class: cls, definition: def, notes };
  storageSave(); render();
}

function toggleSentenceEdit(idx) {
  const el = document.getElementById('se-' + idx);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.item-edit').forEach(e => e.classList.remove('open'));
  if (!isOpen) {
    const s = data.sentences[idx];
    el.innerHTML =
      '<div style="margin-bottom:8px;"><label class="edit-label">Sentence</label>' +
      '<input type="text" id="es-sent-' + idx + '" value="' + esc(s.sentence) + '" /></div>' +
      '<div class="edit-actions">' +
        '<button class="btn-sm" onclick="saveSentenceEdit(' + idx + ')">Save</button>' +
        '<button class="btn-sm" onclick="toggleSentenceEdit(' + idx + ')">Cancel</button>' +
      '</div>';
    el.classList.add('open');
  }
}

function saveSentenceEdit(idx) {
  const newVal = document.getElementById('es-sent-' + idx).value.trim();
  if (!newVal) { alert('Sentence cannot be empty.'); return; }
  const dup = data.sentences.findIndex((s, i) => i !== idx && normalize(s.sentence) === normalize(newVal));
  if (dup !== -1) { alert('This sentence already exists.'); return; }
  data.sentences[idx].sentence = newVal;
  storageSave(); render();
}

function removeSentence(idx) {
  if (!confirm('Remove this sentence?')) return;
  data.sentences.splice(idx, 1);
  storageSave(); render();
}

function normalize(str) { return str.toLowerCase().replace(/\s+/g,' ').trim(); }

function drawWord() {
  const pool = practiceFilter === 'all' ? data.words : data.words.filter(w => w.class === practiceFilter);
  if (!pool.length) {
    document.getElementById('practice-card').innerHTML = '<div class="empty">No words in this class yet. Add some first.</div>';
    document.getElementById('sentence-section').style.display = 'none';
    return;
  }
  currentWord = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('practice-card').innerHTML =
    '<div class="practice-word">' + esc(currentWord.word) + '</div>' +
    '<div class="practice-class"><span class="badge badge-' + currentWord.class + '">' + currentWord.class + '</span></div>' +
    '<div class="practice-def">' + esc(currentWord.definition) + '</div>' +
    (currentWord.notes ? '<div style="margin-top:8px;font-size:12px;color:var(--text-tertiary);">' + esc(currentWord.notes) + '</div>' : '');
  document.getElementById('sentence-section').style.display = 'block';
  document.getElementById('inp-sentence').value = '';
  document.getElementById('save-feedback').style.display = 'none';
}

function saveSentence() {
  const s = document.getElementById('inp-sentence').value.trim();
  const fb = document.getElementById('save-feedback');
  if (!s || !currentWord) return;
  if (data.sentences.find(x => normalize(x.sentence) === normalize(s))) {
    showFeedback(fb, 'This sentence is already saved.', '#E24B4A'); return;
  }
  data.sentences.push({ sentence: s, word: currentWord.word, class: currentWord.class, date: new Date().toISOString() });
  storageSave(); render();
  showFeedback(fb, 'Saved!', '#1D9E75');
}

function copyExport() { navigator.clipboard.writeText(JSON.stringify(data, null, 2)); }
function downloadExport() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'lojban_words.json'; a.click();
}

function importData() {
  const raw = document.getElementById('imp-area').value.trim();
  const fb = document.getElementById('import-feedback');
  try {
    const imported = JSON.parse(raw);
    const words = imported.words || []; const sentences = imported.sentences || [];
    let added = 0;
    words.forEach(w => { if (!data.words.find(x => x.word === w.word)) { data.words.push(w); added++; } });
    sentences.forEach(s => { data.sentences.push(s); });
    storageSave(); render();
    document.getElementById('imp-area').value = '';
    showFeedback(fb, 'Imported ' + added + ' new words and ' + sentences.length + ' sentences.', '#1D9E75');
  } catch(e) { showFeedback(fb, 'Invalid JSON. Please check the format.', '#E24B4A'); }
}

function setWordsTabFilter(f, btn) {
  wordsTabFilter = f;
  document.querySelectorAll('#words-tab-filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderWordsTab();
}

function setPracticeFilter(f, btn) {
  practiceFilter = f;
  document.querySelectorAll('#practice-filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function switchTab(name) {
  const names = ['add','words','practice','sentences','export'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'export') renderExport();
  if (name === 'words') renderWordsTab();
}

function wordItemHTML(w, editable, prefix) {
  prefix = prefix || 'we';
  return '<div class="item-card">' +
    '<div class="item-view">' +
      '<div class="item-body">' +
        '<div class="item-main">' + esc(w.word) + ' <span class="badge badge-' + w.class + '">' + w.class + '</span></div>' +
        '<div class="item-sub">' + esc(w.definition) + '</div>' +
        (w.notes ? '<div class="item-meta">' + esc(w.notes) + '</div>' : '') +
      '</div>' +
      '<div class="item-actions">' +
        (editable ? '<button class="act-btn" title="Edit" onclick="toggleWordEdit(\'' + esc(w.word) + '\',\'' + prefix + '\')">&#9998;</button>' : '') +
        '<button class="act-btn del" title="Delete" onclick="removeWord(\'' + esc(w.word) + '\')">&#10005;</button>' +
      '</div>' +
    '</div>' +
    '<div class="item-edit" id="' + prefix + '-' + esc(w.word) + '"></div>' +
  '</div>';
}

function renderAddRecent() {
  const last5 = data.words.slice(-5).reverse();
  const hidden = data.words.length - last5.length;
  const c = document.getElementById('add-recent-list');
  if (!last5.length) { c.innerHTML = '<div class="empty" style="padding:1rem 0;">No words yet.</div>'; return; }
  c.innerHTML = last5.map(w => wordItemHTML(w, false, 'wr')).join('') +
    (hidden > 0 ? '<div class="more-hint">+ ' + hidden + ' more — see all in the Words tab</div>' : '');
}

function renderWordsTab() {
  const query = (document.getElementById('word-search').value || '').toLowerCase().trim();
  let filtered = wordsTabFilter === 'all' ? data.words : data.words.filter(w => w.class === wordsTabFilter);
  if (query) filtered = filtered.filter(w =>
    w.word.includes(query) || w.definition.toLowerCase().includes(query) || (w.notes||'').toLowerCase().includes(query)
  );
  const shown = query ? [...filtered].reverse() : [...filtered].reverse().slice(0, 10);
  const hidden = (!query && filtered.length > 10) ? filtered.length - 10 : 0;
  document.getElementById('words-tab-count').textContent = data.words.length;
  const c = document.getElementById('words-tab-list');
  if (!shown.length) { c.innerHTML = '<div class="empty">' + (query ? 'No results for "' + esc(query) + '".' : 'No words yet.') + '</div>'; return; }
  c.innerHTML = shown.map(w => wordItemHTML(w, true, 'wt')).join('') +
    (hidden > 0 ? '<div class="more-hint">Showing last 10 of ' + filtered.length + ' — use the search bar to find older words</div>' : '');
}

function renderSentences() {
  const query = (document.getElementById('sentence-search') ? document.getElementById('sentence-search').value : '').toLowerCase().trim();
  document.getElementById('sentence-count').textContent = data.sentences.length;
  const c = document.getElementById('sentence-list-container');
  if (!data.sentences.length) { c.innerHTML = '<div class="empty">No sentences yet. Practice to add some.</div>'; return; }
  let indexed = data.sentences.map((s, i) => ({ s, origIdx: i })).reverse();
  if (query) indexed = indexed.filter(({s}) => s.sentence.toLowerCase().includes(query) || s.word.toLowerCase().includes(query));
  const shown = query ? indexed : indexed.slice(0, 10);
  const hidden = (!query && indexed.length > 10) ? indexed.length - 10 : 0;
  if (!shown.length) { c.innerHTML = '<div class="empty">No results for "' + esc(query) + '".</div>'; return; }
  c.innerHTML = shown.map(({s, origIdx}) =>
    '<div class="item-card">' +
      '<div class="item-view">' +
        '<div class="item-body">' +
          '<div class="item-main">' + esc(s.sentence) + '</div>' +
          '<div class="item-meta">word: <strong>' + esc(s.word) + '</strong> &middot; ' + new Date(s.date).toLocaleDateString() + '</div>' +
        '</div>' +
        '<div class="item-actions">' +
          '<button class="act-btn" title="Edit" onclick="toggleSentenceEdit(' + origIdx + ')">&#9998;</button>' +
          '<button class="act-btn del" title="Delete" onclick="removeSentence(' + origIdx + ')">&#10005;</button>' +
        '</div>' +
      '</div>' +
      '<div class="item-edit" id="se-' + origIdx + '"></div>' +
    '</div>'
  ).join('') + (hidden > 0 ? '<div class="more-hint">Showing last 10 of ' + indexed.length + ' — use the search bar to find older sentences</div>' : '');
}

function renderExport() { document.getElementById('export-area').textContent = JSON.stringify(data, null, 2); }

function render() {
  document.getElementById('word-count').textContent = data.words.length + ' word' + (data.words.length !== 1 ? 's' : '');
  renderAddRecent();
  if (document.getElementById('tab-words').classList.contains('active')) renderWordsTab();
  renderSentences();
}

function showFeedback(el, msg, color) {
  el.textContent = msg; el.style.color = color; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

storageLoad();
render();
</script>
</body>
</html>
